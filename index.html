<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XVTransit · Presentació interactiva</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #ff9800;
      --orange-2: #ffb43b;
      --black: #050505;
      --ink: #111111;
      --white: #ffffff;
      --cream: #f4efe6;
      --muted: rgba(255,255,255,.72);
      --glass: rgba(10,10,10,.58);
      --line: rgba(255,255,255,.14);
      --shadow: 0 30px 90px rgba(0,0,0,.45);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--white);
      background:
        radial-gradient(circle at 12% 8%, rgba(255,152,0,.35), transparent 28rem),
        radial-gradient(circle at 90% 18%, rgba(255,152,0,.18), transparent 24rem),
        linear-gradient(135deg, #050505 0%, #111 42%, #070707 100%);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    body.zen .topbar,
    body.zen .side-dots,
    body.zen .floating-controls,
    body.zen .help-pill {
      opacity: 0;
      pointer-events: none;
    }

    body.zen .slide-meta {
      opacity: .08;
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: .08;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='220' height='220' filter='url(%23n)' opacity='.5'/%3E%3C/svg%3E");
    }

    .cursor-glow {
      position: fixed;
      width: 520px;
      height: 520px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,152,0,.22), transparent 66%);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 1;
      filter: blur(8px);
      opacity: .7;
    }

    .topbar {
      position: fixed;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: min(980px, calc(100vw - 18px));
      z-index: 20;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 6px;
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 999px;
      background: rgba(0,0,0,.36);
      box-shadow: 0 10px 36px rgba(0,0,0,.28);
      backdrop-filter: blur(18px);
      opacity: .18;
      transition: opacity .22s ease, transform .22s ease, background .22s ease;
    }

    .topbar:hover,
    .topbar:focus-within {
      opacity: .98;
      background: rgba(0,0,0,.72);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      color: var(--black);
      background: linear-gradient(135deg, var(--orange), var(--orange-2));
      font-weight: 900;
      letter-spacing: -.08em;
      box-shadow: 0 0 24px rgba(255,152,0,.45);
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .brand-text strong {
      font-family: Oswald, sans-serif;
      font-size: 1.05rem;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .brand-text span {
      color: var(--muted);
      font-size: .72rem;
      margin-top: 4px;
    }

    .progress-wrap {
      position: relative;
      min-width: 120px;
      height: 36px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-line {
      position: relative;
      flex: 1;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.13);
      overflow: hidden;
    }

    .progress-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--orange), #fff1d1);
      box-shadow: 0 0 20px rgba(255,152,0,.6);
      transition: width .35s ease;
    }

    .counter {
      font-weight: 800;
      color: var(--orange-2);
      min-width: 52px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    select,
    button,
    a.button {
      border: 1px solid rgba(255,255,255,.14);
      color: var(--white);
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      min-height: 36px;
      padding: 0 13px;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: transform .2s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;
    }

    select {
      width: min(260px, 28vw);
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, var(--orange) 50%), linear-gradient(135deg, var(--orange) 50%, transparent 50%);
      background-position: calc(100% - 18px) 18px, calc(100% - 12px) 18px;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      padding-right: 34px;
    }

    option {
      color: #111;
      background: #fff;
    }

    button:hover,
    a.button:hover,
    select:hover {
      transform: translateY(-1px);
      background: rgba(255,152,0,.18);
      border-color: rgba(255,152,0,.5);
      box-shadow: 0 0 0 4px rgba(255,152,0,.08);
    }

    .primary {
      background: linear-gradient(135deg, var(--orange), var(--orange-2));
      color: #111;
      border: 0;
      box-shadow: 0 14px 34px rgba(255,152,0,.25);
    }

    .deck {
      position: relative;
      z-index: 2;
      scroll-snap-type: y mandatory;
    }

    .slide-section {
      min-height: 100svh;
      scroll-snap-align: start;
      display: grid;
      place-items: center;
      padding: 6px;
      position: relative;
      isolation: isolate;
    }

    .slide-section::before {
      content: "";
      display: none;
    }

    .slide-shell {
      width: 100vw;
      min-height: 100svh;
      display: grid;
      grid-template-columns: 1fr;
      align-items: center;
      justify-items: center;
      position: relative;
    }

    .slide-meta {
      display: none;
      position: absolute;
      left: clamp(8px, 1.5vw, 24px);
      top: clamp(8px, 1.5vw, 24px);
      z-index: 6;
      width: min(330px, 28vw);
      padding: 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.42);
      box-shadow: 0 18px 50px rgba(0,0,0,.28);
      backdrop-filter: blur(16px);
      transform: translateY(12px);
      opacity: 0;
      transition: opacity .75s ease, transform .75s ease;
    }

    .is-active .slide-meta {
      transform: translateY(0);
      opacity: .14;
    }

    .is-active .slide-meta:hover,
    .is-active .slide-meta:focus-within {
      opacity: .96;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 8px 12px;
      border: 1px solid rgba(255,152,0,.4);
      border-radius: 999px;
      color: var(--orange-2);
      background: rgba(255,152,0,.1);
      font-weight: 900;
      font-size: .8rem;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--orange);
      box-shadow: 0 0 16px var(--orange);
    }

    h1,
    h2 {
      margin: 10px 0 8px;
      font-family: Oswald, Impact, sans-serif;
      text-transform: uppercase;
      letter-spacing: -.03em;
      line-height: .92;
      font-size: clamp(2.2rem, 3.8vw, 4.8rem);
    }

    h2 span {
      color: var(--orange);
      text-shadow: 0 0 28px rgba(255,152,0,.35);
    }

    .kicker {
      margin: 0 0 10px;
      color: rgba(255,255,255,.88);
      font-size: clamp(.88rem, 1vw, 1.04rem);
      font-weight: 700;
      line-height: 1.42;
    }

    .desc {
      margin: 0;
      color: rgba(255,255,255,.63);
      line-height: 1.5;
      max-width: 28rem;
      font-size: .9rem;
    }

    .meta-actions {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .slide-card {
      position: relative;
      width: min(calc(100vw - 12px), calc((100svh - 12px) * 16 / 9), 1920px);
      margin: 0 auto;
      border-radius: 18px;
      padding: 3px;
      background: linear-gradient(135deg, rgba(255,152,0,.45), rgba(255,255,255,.06));
      border: 1px solid rgba(255,152,0,.26);
      box-shadow: 0 30px 110px rgba(0,0,0,.72), 0 0 80px rgba(255,152,0,.14);
      transform: perspective(1400px) rotateX(2deg) rotateY(-1deg) scale(.985) translateY(10px);
      opacity: .68;
      transition: transform .7s cubic-bezier(.2,.75,.1,1), opacity .55s ease, box-shadow .55s ease;
      overflow: hidden;
    }

    .slide-card::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(115deg, transparent 0 35%, rgba(255,255,255,.28) 45%, transparent 55% 100%);
      transform: translateX(-120%);
      opacity: .6;
      pointer-events: none;
    }

    .is-active .slide-card {
      transform: perspective(1400px) rotateX(0) rotateY(0) scale(1) translateY(0);
      opacity: 1;
      box-shadow: 0 40px 130px rgba(0,0,0,.78), 0 0 0 1px rgba(255,152,0,.28), 0 0 90px rgba(255,152,0,.18);
    }

    .is-active .slide-card::before {
      animation: shine 1.25s ease .28s both;
    }

    @keyframes shine {
      to { transform: translateX(120%); }
    }

    .slide-card img {
      display: block;
      width: 100%;
      max-height: calc(100svh - 12px);
      aspect-ratio: 16 / 9;
      object-fit: contain;
      border-radius: 14px;
      background: #111;
      user-select: none;
    }

    .slide-card figcaption {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      display: none;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 9px 12px;
      border-radius: 16px;
      background: rgba(0,0,0,.42);
      border: 1px solid rgba(255,255,255,.1);
      backdrop-filter: blur(16px);
      color: rgba(255,255,255,.84);
      font-size: .78rem;
      font-weight: 700;
      opacity: .18;
      transition: opacity .2s ease;
    }

    .slide-card:hover figcaption {
      opacity: .92;
    }

    .slide-card figcaption span:first-child {
      color: var(--orange-2);
    }

    .side-dots {
      position: fixed;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 19;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(0,0,0,.28);
      border: 1px solid rgba(255,255,255,.08);
      backdrop-filter: blur(14px);
      opacity: .16;
      transition: opacity .22s ease;
    }

    .side-dots:hover,
    .side-dots:focus-within {
      opacity: .95;
    }

    .dot {
      width: 8px;
      height: 8px;
      padding: 0;
      min-height: 8px;
      border: 0;
      background: rgba(255,255,255,.35);
      border-radius: 50%;
    }

    .dot.active {
      height: 24px;
      background: var(--orange);
      box-shadow: 0 0 16px rgba(255,152,0,.7);
    }

    .floating-controls {
      position: fixed;
      left: 50%;
      bottom: 8px;
      transform: translateX(-50%);
      z-index: 21;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px;
      border-radius: 999px;
      background: rgba(0,0,0,.38);
      border: 1px solid rgba(255,255,255,.09);
      backdrop-filter: blur(18px);
      opacity: .16;
      transition: opacity .22s ease, background .22s ease;
    }

    .floating-controls:hover,
    .floating-controls:focus-within {
      opacity: .96;
      background: rgba(0,0,0,.72);
    }

    .floating-controls button {
      min-width: 46px;
      padding: 0 14px;
    }

    .help-pill {
      display: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(0,0,0,.82);
      backdrop-filter: blur(20px);
    }

    .modal.open {
      display: grid;
    }

    .modal-card {
      width: min(1920px, 99.6vw);
      height: min(1080px, 98vh);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 28px;
      overflow: hidden;
      background: #080808;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }

    .modal-head strong {
      font-family: Oswald, sans-serif;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .modal iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #111;
    }

    .toast {
      position: fixed;
      top: 92px;
      right: 24px;
      z-index: 60;
      transform: translateY(-12px);
      opacity: 0;
      pointer-events: none;
      padding: 12px 16px;
      border-radius: 16px;
      color: #111;
      background: linear-gradient(135deg, var(--orange), #ffd087);
      font-weight: 900;
      box-shadow: 0 16px 44px rgba(255,152,0,.25);
      transition: opacity .25s ease, transform .25s ease;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }



    body.zen .slide-section {
      padding: 0;
    }

    body.zen .slide-card {
      width: min(100vw, calc(100svh * 16 / 9), 2200px);
      padding: 0;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      background: #000;
    }

    body.zen .slide-card img {
      max-height: 100svh;
      border-radius: 0;
    }

    @media (max-width: 940px) {
      .topbar {
        grid-template-columns: 1fr;
        border-radius: 26px;
      }

      .brand {
        justify-content: center;
      }

      .actions {
        justify-content: center;
        flex-wrap: wrap;
      }

      select {
        width: 100%;
      }

      .slide-section {
        padding-top: 6px;
      }

      .slide-shell {
        grid-template-columns: 1fr;
      }

      .slide-meta {
        display: none;
      }

      .desc {
        margin-inline: auto;
      }

      .meta-actions {
        justify-content: center;
      }

      .side-dots,
      .help-pill {
        display: none;
      }
    }

    @media (max-width: 620px) {
      .brand-text span,
      .progress-wrap,
      .hide-sm {
        display: none;
      }

      .slide-section {
        padding: 4px;
      }

      h1,
      h2 {
        font-size: clamp(2.65rem, 16vw, 4.6rem);
      }

      .slide-card figcaption {
        display: none;
      }

      .floating-controls {
        width: calc(100vw - 28px);
        justify-content: center;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body class="presentation-first">
  <div class="noise" aria-hidden="true"></div>
  <div class="cursor-glow" aria-hidden="true"></div>

  <header class="topbar" aria-label="Controls de presentació">
    <div class="brand">
      <div class="brand-mark">XV</div>
      <div class="brand-text">
        <strong>XVTransit</strong>
        <span>Presentació interactiva</span>
      </div>
    </div>
    <div class="progress-wrap" aria-hidden="true">
      <div class="progress-line"><div class="progress-fill" id="progressFill"></div></div>
      <div class="counter" id="counter">01/21</div>
    </div>
    <div class="actions">
      <select id="jumpSelect" aria-label="Selecciona una diapositiva"></select>
      <button id="canvaBtn" class="primary">Obrir a Canva</button>
      <a class="button hide-sm" href="assets/docs/presentacio-xvtransit.pdf" target="_blank" rel="noreferrer">PDF</a>
      <button id="zenBtn" class="hide-sm">Focus</button>
      <button id="fullscreenBtn" class="hide-sm">Pantalla</button>
    </div>
  </header>

  <nav class="side-dots" id="sideDots" aria-label="Navegació per diapositives"></nav>

  <main class="deck" id="deck"></main>

  <div class="floating-controls" aria-label="Controls ràpids">
    <button id="prevBtn" title="Anterior">←</button>
    <button id="autoBtn" class="primary" title="Reproducció automàtica">Auto</button>
    <button id="nextBtn" title="Següent">→</button>
  </div>

  <div class="help-pill">Roda del ratolí, fletxes o barra espaiadora</div>

  <div class="modal" id="canvaModal" role="dialog" aria-modal="true" aria-label="Vista Canva">
    <div class="modal-card">
      <div class="modal-head">
        <strong>Vista Canva</strong>
        <div class="actions">
          <a class="button" id="canvaNewTab" href="#" target="_blank" rel="noreferrer">Nova pestanya</a>
          <button id="closeModal">Tancar</button>
        </div>
      </div>
      <iframe id="canvaFrame" title="XVTransit a Canva" loading="lazy"></iframe>
    </div>
  </div>

  <div class="toast" id="toast">Fet</div>

  <script>

    const deck = document.getElementById("deck");
    const sideDots = document.getElementById("sideDots");
    const jumpSelect = document.getElementById("jumpSelect");
    const progressFill = document.getElementById("progressFill");
    const counter = document.getElementById("counter");
    const canvaModal = document.getElementById("canvaModal");
    const canvaFrame = document.getElementById("canvaFrame");
    const canvaNewTab = document.getElementById("canvaNewTab");
    const toast = document.getElementById("toast");
    const cursorGlow = document.querySelector(".cursor-glow");
    let current = 0;
    let autoTimer = null;

    function two(n) {
      return String(n).padStart(2, "0");
    }

    function renderSlides() {
      deck.innerHTML = slides.map((slide, index) => `
        <section class="slide-section" id="slide-${two(slide.number)}" data-index="${index}" data-number="${two(slide.number)}">
          <div class="slide-shell">
            <aside class="slide-meta">
              <span class="eyebrow">Diapositiva ${two(slide.number)}</span>
              <h${index === 0 ? "1" : "2"}>${slide.title.replace("XVTransit", "<span>XVTransit</span>")}</h${index === 0 ? "1" : "2"}>
              <p class="kicker">${slide.kicker}</p>
              <p class="desc">${slide.desc}</p>
              <div class="meta-actions">
                <button onclick="goToSlide(${Math.max(0, index - 1)})">Anterior</button>
                <button class="primary" onclick="goToSlide(${Math.min(slides.length - 1, index + 1)})">Següent</button>
              </div>
            </aside>
            <figure class="slide-card">
              <img src="${slide.src}" alt="${slide.alt}" loading="${index < 2 ? "eager" : "lazy"}">
              <figcaption><span>${two(slide.number)} / ${two(slides.length)}</span><span>${slide.title}</span></figcaption>
            </figure>
          </div>
        </section>
      `).join("");

      sideDots.innerHTML = slides.map((slide, index) => `
        <button class="dot" aria-label="Anar a la diapositiva ${slide.number}" onclick="goToSlide(${index})"></button>
      `).join("");

      jumpSelect.innerHTML = slides.map((slide, index) => `
        <option value="${index}">${two(slide.number)} · ${slide.title}</option>
      `).join("");
    }

    function setActive(index) {
      current = Math.max(0, Math.min(index, slides.length - 1));
      document.querySelectorAll(".slide-section").forEach((section, i) => section.classList.toggle("is-active", i === current));
      document.querySelectorAll(".dot").forEach((dot, i) => dot.classList.toggle("active", i === current));
      progressFill.style.width = `${((current + 1) / slides.length) * 100}%`;
      counter.textContent = `${two(current + 1)}/${two(slides.length)}`;
      jumpSelect.value = String(current);
      document.title = `${two(current + 1)} · ${slides[current].title} · XVTransit`;
    }

    function goToSlide(index) {
      const section = document.querySelector(`[data-index="${index}"]`);
      if (!section) return;
      section.scrollIntoView({ behavior: "smooth", block: "start" });
      setActive(index);
    }

    function nextSlide() {
      goToSlide(Math.min(current + 1, slides.length - 1));
    }

    function prevSlide() {
      goToSlide(Math.max(current - 1, 0));
    }

    function toggleAuto() {
      const btn = document.getElementById("autoBtn");
      if (autoTimer) {
        clearInterval(autoTimer);
        autoTimer = null;
        btn.textContent = "Auto";
        showToast("Reproducció aturada");
        return;
      }
      btn.textContent = "Pausa";
      showToast("Reproducció automàtica activada");
      autoTimer = setInterval(() => {
        if (current >= slides.length - 1) {
          goToSlide(0);
        } else {
          nextSlide();
        }
      }, 6500);
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1800);
    }

    renderSlides();
    setActive(0);

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          setActive(Number(entry.target.dataset.index));
        }
      });
    }, { threshold: .56 });

    document.querySelectorAll(".slide-section").forEach(section => observer.observe(section));

    jumpSelect.addEventListener("change", event => goToSlide(Number(event.target.value)));
    document.getElementById("nextBtn").addEventListener("click", nextSlide);
    document.getElementById("prevBtn").addEventListener("click", prevSlide);
    document.getElementById("autoBtn").addEventListener("click", toggleAuto);

    document.getElementById("zenBtn").addEventListener("click", () => {
      document.body.classList.toggle("zen");
      showToast(document.body.classList.contains("zen") ? "Mode focus activat" : "Mode focus desactivat");
    });

    document.getElementById("fullscreenBtn").addEventListener("click", async () => {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
        showToast("Pantalla completa");
      } else {
        await document.exitFullscreen();
        showToast("Vista normal");
      }
    });

    document.getElementById("canvaBtn").addEventListener("click", () => {
      canvaNewTab.href = CANVA_URL;
      canvaFrame.src = CANVA_URL;
      canvaModal.classList.add("open");
    });

    document.getElementById("closeModal").addEventListener("click", () => {
      canvaModal.classList.remove("open");
      canvaFrame.src = "";
    });

    canvaModal.addEventListener("click", event => {
      if (event.target === canvaModal) {
        canvaModal.classList.remove("open");
        canvaFrame.src = "";
      }
    });

    window.addEventListener("keydown", event => {
      if (["ArrowDown", "ArrowRight", " ", "PageDown"].includes(event.key)) {
        event.preventDefault();
        nextSlide();
      }
      if (["ArrowUp", "ArrowLeft", "PageUp"].includes(event.key)) {
        event.preventDefault();
        prevSlide();
      }
      if (event.key === "Home") {
        event.preventDefault();
        goToSlide(0);
      }
      if (event.key === "End") {
        event.preventDefault();
        goToSlide(slides.length - 1);
      }
      if (event.key === "Escape" && canvaModal.classList.contains("open")) {
        canvaModal.classList.remove("open");
        canvaFrame.src = "";
      }
    });

    window.addEventListener("mousemove", event => {
      cursorGlow.style.left = `${event.clientX}px`;
      cursorGlow.style.top = `${event.clientY}px`;
    });

    window.goToSlide = goToSlide;
  </script>
